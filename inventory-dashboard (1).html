<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cattle Valley — Livestock Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #080c10;
    --surf:    #0d1219;
    --card:    #111820;
    --border:  #1c2635;
    --border2: #243045;
    --accent:  #4af2a1;
    --gold:    #f5c842;
    --red:     #ff4c6a;
    --blue:    #4a9eff;
    --purple:  #a78bfa;
    --txt:     #d8e6f0;
    --txt2:    #7a9ab8;
    --txt3:    #3d5470;
    --r:       12px;
    --r-sm:    8px;
  }
  html, body { height: 100%; }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--txt);
    min-height: 100vh;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 12px 20px;
    background: var(--surf);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 200;
  }
  .brand {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px;
    color: var(--accent); letter-spacing: .05em; flex-shrink: 0;
  }
  .topbar-sep { width:1px; height:20px; background:var(--border2); flex-shrink:0; }

  .btn {
    padding: 7px 16px; border: none; border-radius: var(--r-sm);
    cursor: pointer; font-family: 'DM Mono', monospace; font-size: 11px;
    font-weight: 500; transition: all .18s; white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #020e07; }
  .btn-primary:hover:not(:disabled) { background: #2de88d; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn-ghost {
    background: transparent; color: var(--gold);
    border: 1px solid var(--border2);
    display: none;
  }
  .btn-ghost:hover:not(:disabled) { background: rgba(245,200,66,.08); border-color: var(--gold); }
  .btn-reload { background: var(--border2); color: var(--txt2); }
  .btn-reload:hover:not(:disabled) { background: var(--border); color: var(--txt); }

  .prog-wrap { flex:1; min-width:80px; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
  .prog-bar  { height:100%; width:0%; background: linear-gradient(90deg,var(--accent),var(--blue)); transition:width .3s; }
  .status-txt { font-size:10px; color:var(--txt3); white-space:nowrap; }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: none; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 10px 20px;
    background: var(--surf); border-bottom: 1px solid var(--border);
  }
  .filter-bar.on { display: flex; }
  .fl { font-size:9px; text-transform:uppercase; letter-spacing:.1em; color:var(--txt3); }
  .chip-group { display:flex; gap:4px; }
  .chip {
    padding: 4px 12px; border-radius: 30px; border: 1px solid var(--border2);
    background: transparent; color: var(--txt2);
    font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer; transition: all .15s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.on { background: var(--accent); border-color: var(--accent); color: #020e07; font-weight: 500; }

  .sep { width:1px; height:18px; background:var(--border2); flex-shrink:0; }

  .search-box {
    padding: 5px 11px; border-radius: var(--r-sm);
    border: 1px solid var(--border2); background: var(--card);
    color: var(--txt); font-family: 'DM Mono', monospace; font-size: 10px;
    outline: none; width: 170px; transition: border-color .15s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--txt3); }

  /* ── STATS ── */
  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
    gap: 10px; padding: 16px 20px 0;
  }
  .sc {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); padding: 13px 15px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .sc-label { font-size:9px; text-transform:uppercase; letter-spacing:.08em; color:var(--txt3); }
  .sc-val { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; }
  .c-green { color:var(--accent); }
  .c-red   { color:var(--red); }
  .c-gold  { color:var(--gold); }
  .c-blue  { color:var(--blue); }
  .c-purple{ color:var(--purple); }
  .c-txt   { color:var(--txt); }

  /* ── GRID ── */
  .grid-wrap { padding: 16px 20px 50px; }
  .count-line { font-size:10px; color:var(--txt3); margin-bottom:12px; }
  .count-line em { color:var(--txt2); font-style:normal; }

  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px,1fr));
    gap: 13px;
  }

  /* ── ITEM CARD ── */
  .icard {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); overflow: hidden;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    display: flex; flex-direction: column;
  }
  .icard:hover {
    transform: translateY(-3px); border-color: var(--border2);
    box-shadow: 0 14px 45px rgba(0,0,0,.55);
  }

  .img-wrap {
    width:100%; height:155px;
    background: var(--surf);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; position:relative; flex-shrink:0;
  }
  .img-wrap img {
    width:100%; height:100%; object-fit:cover;
    transition: transform .3s;
  }
  .icard:hover .img-wrap img { transform: scale(1.04); }
  .img-ph { font-size:50px; opacity:.18; user-select:none; }

  .badge {
    position:absolute; padding:3px 9px; border-radius:20px;
    font-size:9px; font-weight:500; letter-spacing:.05em; text-transform:uppercase;
    backdrop-filter:blur(8px);
  }
  .badge-cat { top:9px; left:9px; }
  .badge-bull  { background:rgba(245,200,66,.18); color:var(--gold);  border:1px solid rgba(245,200,66,.35); }
  .badge-goat  { background:rgba(74,158,255,.18); color:var(--blue);  border:1px solid rgba(74,158,255,.35); }
  .badge-other { background:rgba(122,154,184,.12);color:var(--txt2);  border:1px solid rgba(122,154,184,.2); }

  .badge-stock { top:9px; right:9px; }
  .badge-in  { background:rgba(74,242,161,.15); color:var(--accent); border:1px solid rgba(74,242,161,.3); }
  .badge-out { background:rgba(255,76,106,.15); color:var(--red);    border:1px solid rgba(255,76,106,.3); }

  .ibody { padding:12px 14px; flex:1; display:flex; flex-direction:column; gap:9px; }

  .iname {
    font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
    color:var(--txt); line-height:1.3;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .imeta { display:flex; flex-direction:column; gap:5px; }
  .mrow  { display:flex; align-items:center; gap:7px; font-size:10px; color:var(--txt2); }
  .mico  { width:14px; text-align:center; font-size:11px; flex-shrink:0; }
  .mval  { color:var(--txt); font-size:10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .iprice {
    margin-top:auto; padding-top:10px; border-top:1px solid var(--border);
    display:flex; align-items:baseline; gap:4px;
  }
  .pcurr { font-size:9px; color:var(--txt3); }
  .pval  { font-family:'Syne',sans-serif; font-size:17px; font-weight:700; color:var(--accent); }
  .plbl  { font-size:9px; color:var(--txt3); margin-left:auto; }

  .qty-row { display:flex; gap:8px; padding-top:4px; }
  .qty-pill {
    display:flex; flex-direction:column; align-items:center;
    flex:1; background:var(--surf); border-radius:6px;
    padding:5px 4px; border:1px solid var(--border);
  }
  .qty-pill .qn { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:var(--txt); }
  .qty-pill .ql { font-size:8px; color:var(--txt3); text-transform:uppercase; letter-spacing:.05em; }

  .empty { text-align:center; padding:70px 20px; color:var(--txt3); }
  .empty-ico { font-size:48px; opacity:.3; margin-bottom:14px; }
  .empty-title { font-family:'Syne',sans-serif; font-size:16px; color:var(--txt2); margin-bottom:6px; }
  .empty-sub { font-size:11px; }

  .err-box {
    margin:20px; background:rgba(255,76,106,.07); border:1px solid rgba(255,76,106,.22);
    border-radius:var(--r); padding:16px 20px; font-size:12px; color:var(--red);
  }
  .err-box small { color:var(--txt3); display:block; margin-top:6px; font-size:11px; }

  .debug-box {
    margin:16px 20px 0; background:var(--card); border:1px solid var(--border2);
    border-radius:var(--r); padding:12px 16px; font-size:10px; color:var(--txt3);
    font-family:'DM Mono',monospace; overflow:auto; max-height:200px;
    display:none;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">🐄 CATTLE VALLEY</div>
  <div class="topbar-sep"></div>
  <button class="btn btn-primary" id="load-btn" onclick="loadAllRecords()">⬇ Load Inventory</button>
  <button class="btn btn-ghost"   id="pdf-btn"  onclick="exportPDF()">⬇ Export PDF</button>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Press Load to fetch data from Manager.io</span>
</div>

<div class="filter-bar" id="filter-bar">
  <span class="fl">Category</span>
  <div class="chip-group" id="cat-grp">
    <button class="chip on" data-val="all">All</button>
    <button class="chip" data-val="bull">🐂 Bulls</button>
    <button class="chip" data-val="goat">🐐 Goats</button>
    <button class="chip" data-val="other">Other</button>
  </div>
  <div class="sep"></div>
  <span class="fl">Stock</span>
  <div class="chip-group" id="stock-grp">
    <button class="chip on" data-val="all">Total</button>
    <button class="chip" data-val="in">In Stock</button>
    <button class="chip" data-val="out">Sold Out</button>
  </div>
  <div class="sep"></div>
  <input class="search-box" id="q" placeholder="🔍 Search name…" oninput="applyFilters()">
</div>

<!-- debug panel — shows raw first record JSON so you can identify real field names -->
<div class="debug-box" id="debug-box"></div>

<div id="app"></div>

<script>
/* ════════════════════════════════════════
   postMessage helper — DO NOT MODIFY
════════════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ════════════════════════════════════════
   Paginated fetch — DO NOT SIMPLIFY
════════════════════════════════════════ */
async function fetchAllPages(endpoint, onProgress) {
  const all = [];
  let nextToken = null;
  let pageNum   = 0;
  let apiTotal  = null;

  do {
    const sep  = endpoint.includes('?') ? '&' : '?';
    const path = nextToken
      ? `${endpoint}${sep}next_page_token=${encodeURIComponent(nextToken)}`
      : endpoint;

    const data = await postMessageWithResponse({ type: 'api-request', method: 'GET', path });

    /* Manager.io inventory-items returns an array directly or wrapped in .items */
    const page = Array.isArray(data) ? data : (data.items ?? data.data ?? []);
    all.push(...page);

    nextToken = data.next_page_token ?? data.nextPageToken ?? data._links?.next?.href ?? null;

    if (apiTotal === null) {
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;
    }

    pageNum++;
    if (onProgress) onProgress(all.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;

  } while (nextToken);

  return all;
}

/* ════════════════════════════════════════
   State
════════════════════════════════════════ */
let ALL_ITEMS   = [];
let catFilter   = 'all';
let stockFilter = 'all';

/* ════════════════════════════════════════
   loadAllRecords
════════════════════════════════════════ */
async function loadAllRecords() {
  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app    = document.getElementById('app');
  const fb     = document.getElementById('filter-bar');
  const pdfBtn = document.getElementById('pdf-btn');
  const dbg    = document.getElementById('debug-box');

  btn.disabled = true;
  btn.textContent = 'Loading…';
  btn.classList.remove('btn-reload');
  bar.style.width  = '0%';
  app.innerHTML    = '';
  fb.classList.remove('on');
  pdfBtn.style.display = 'none';
  dbg.style.display = 'none';

  try {
    status.textContent = 'Fetching inventory items…';

    const items = await fetchAllPages('/api4/inventory-items', (loaded, total, page) => {
      status.textContent = total
        ? `Page ${page} · ${loaded.toLocaleString()} / ${total.toLocaleString()} items`
        : `Page ${page} · ${loaded.toLocaleString()} items…`;
      if (total) bar.style.width = Math.min(90, Math.round(loaded / total * 100)) + '%';
    });

    bar.style.width = '100%';
    status.textContent = `✓ ${items.length.toLocaleString()} items loaded`;
    btn.textContent = '↺ Reload';
    btn.classList.add('btn-reload');
    btn.disabled = false;
    pdfBtn.style.display = 'inline-block';

    /* Show a debug panel with the first raw record so field names are visible */
    if (items.length > 0) {
      dbg.style.display = 'block';
      dbg.textContent = '── First raw record (for field-name reference) ──\n'
        + JSON.stringify(items[0], null, 2);
    }

    ALL_ITEMS = items;
    setupFilterChips();
    fb.classList.add('on');
    applyFilters();

  } catch (err) {
    status.textContent = '⚠ ' + err.message;
    btn.textContent = '↺ Retry';
    btn.disabled = false;
    app.innerHTML = `<div class="err-box">⚠ ${esc(err.message)}<small>Make sure this extension is running inside Manager.io with access to Inventory Items.</small></div>`;
  }
}

/* ════════════════════════════════════════
   Field accessor — extracts all display
   fields from a single inventory record.

   Manager.io /api4/inventory-items fields
   observed from screenshot:
     item.name            → "Bull_1"
     item.controlAccount  → { name: "Bulls Stock" }
     item.salesPrice      → numeric sale price
     item.customFields2   → { decimals:{}, strings:{} }
       decimals may include Weight, Qty owned
       strings  may include Animal Breed, Shed Name
     item.quantityOnHand  → qty on hand (direct field)
════════════════════════════════════════ */
function getField(raw) {
  /* Records from inventory-items are often nested under .item */
  const r = raw?.item ?? raw;

  /* ── helpers to scan customFields2 by keyword ── */
  const dec2  = r?.customFields2?.decimals ?? {};
  const str2  = r?.customFields2?.strings  ?? {};
  const imgs2 = r?.customFields2?.images   ?? {};

  function fDec(keys) {
    for (const [k,v] of Object.entries(dec2))
      if (keys.some(kw => k.toLowerCase().includes(kw)) && v != null) return Number(v);
    return null;
  }
  function fStr(keys) {
    for (const [k,v] of Object.entries(str2))
      if (keys.some(kw => k.toLowerCase().includes(kw)) && v) return String(v);
    return null;
  }

  /* ── Name ── */
  const name = r?.name ?? r?.nameWithCode ?? '—';

  /* ── Category
     Control Account name is the most reliable signal.
     e.g. "Bulls Stock", "Goats Stock" */
  const ctrl = (r?.controlAccount?.name ?? r?.controlAccount?.text ?? '').toLowerCase();
  let cat = 'other';
  if (/bull/i.test(ctrl) || /bull/i.test(name))          cat = 'bull';
  else if (/goat|sheep|caprin/i.test(ctrl) || /goat/i.test(name)) cat = 'goat';

  /* ── Animal Breed
     From screenshot it's a column — likely a customField string.
     Also try direct field. */
  const breed = fStr(['breed','animal','type','race'])
             ?? r?.animalBreed
             ?? r?.division?.name   // sometimes breed is stored in division
             ?? null;

  /* ── Sales Price
     Manager.io inventory items surface this as salesPrice / unitPrice */
  const price = (r?.salesPrice != null ? Number(r.salesPrice) : null)
             ?? (r?.unitPrice  != null ? Number(r.unitPrice)  : null)
             ?? (r?.salePrice  != null ? Number(r.salePrice)  : null)
             ?? fDec(['sale','price','sell'])
             ?? null;

  /* ── Weight (Kgs) — confirmed column in screenshot ── */
  const weight = (r?.weight != null ? Number(r.weight) : null)
              ?? fDec(['weight','kg','wt','mass','kilo'])
              ?? null;

  /* ── Shed Name — confirmed column in screenshot ── */
  const shed = r?.location
            ?? fStr(['shed','location','pen','barn','farm','stall','field','zone','area','place'])
            ?? null;

  /* ── Qty on hand — direct field confirmed in screenshot ── */
  const qtyOnHand = r?.quantityOnHand != null ? Number(r.quantityOnHand) : null;

  /* ── Qty owned — confirmed column in screenshot ── */
  const qtyOwned = (r?.quantityOwned  != null ? Number(r.quantityOwned)  : null)
                ?? fDec(['owned','qty owned','quantity owned'])
                ?? null;

  /* ── Stock status ── */
  let stockStatus = 'unknown';
  if      (qtyOnHand != null && qtyOnHand > 0) stockStatus = 'in';
  else if (qtyOnHand != null && qtyOnHand <= 0) stockStatus = 'out';
  else if (r?.inactive === true)                 stockStatus = 'out';

  /* ── Image
     Attachments in Manager.io: customFields2.images contains
     { "uuid": { href: "/api4/attachment?..." } }
     We also check _links.image as fallback. */
  let imgUrl = null;
  for (const v of Object.values(imgs2)) {
    if (!v) continue;
    imgUrl = typeof v === 'string' ? v : (v.href ?? v.url ?? null);
    if (imgUrl) break;
  }
  if (!imgUrl) imgUrl = raw?._links?.image?.href ?? raw?._links?.thumbnail?.href ?? null;

  return { name, cat, breed, price, weight, shed, qtyOnHand, qtyOwned, stockStatus, imgUrl };
}

/* ════════════════════════════════════════
   Filter chips
════════════════════════════════════════ */
function setupFilterChips() {
  document.querySelectorAll('#cat-grp .chip').forEach(b => {
    b.onclick = () => {
      document.querySelectorAll('#cat-grp .chip').forEach(x => x.classList.remove('on'));
      b.classList.add('on'); catFilter = b.dataset.val; applyFilters();
    };
  });
  document.querySelectorAll('#stock-grp .chip').forEach(b => {
    b.onclick = () => {
      document.querySelectorAll('#stock-grp .chip').forEach(x => x.classList.remove('on'));
      b.classList.add('on'); stockFilter = b.dataset.val; applyFilters();
    };
  });
}

/* ════════════════════════════════════════
   applyFilters
════════════════════════════════════════ */
function applyFilters() {
  const q = (document.getElementById('q')?.value ?? '').toLowerCase().trim();
  const filtered = ALL_ITEMS.filter(it => {
    const f = getField(it);
    if (catFilter   !== 'all' && f.cat         !== catFilter)   return false;
    if (stockFilter !== 'all' && f.stockStatus !== stockFilter
        && f.stockStatus !== 'unknown')                          return false;
    if (q && !f.name.toLowerCase().includes(q))                 return false;
    return true;
  });
  renderDashboard(filtered, ALL_ITEMS);
}

/* ════════════════════════════════════════
   renderDashboard
════════════════════════════════════════ */
function renderDashboard(items, all) {
  const app = document.getElementById('app');

  if (all.length === 0) {
    app.innerHTML = `
      <div class="empty">
        <div class="empty-ico">📦</div>
        <div class="empty-title">No inventory items found</div>
        <div class="empty-sub">Your Manager.io business has no inventory items, or the API returned no data.</div>
      </div>`;
    return;
  }

  /* ── Stats ── */
  const af      = all.map(getField);
  const inStock = af.filter(f => f.stockStatus === 'in').length;
  const soldOut = af.filter(f => f.stockStatus === 'out').length;
  const bulls   = af.filter(f => f.cat === 'bull').length;
  const goats   = af.filter(f => f.cat === 'goat').length;
  const totVal  = af.reduce((s,f) => s + (f.price  ?? 0), 0);
  const totWgt  = af.reduce((s,f) => s + (f.weight ?? 0), 0);

  const fN = v => v == null ? '—' : Number(v).toLocaleString(undefined,{maximumFractionDigits:0});
  const fP = v => v == null ? '—' : Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

  const statsHTML = `
  <div class="stats-row">
    <div class="sc"><div class="sc-label">Total Items</div><div class="sc-val c-txt">${all.length.toLocaleString()}</div></div>
    <div class="sc"><div class="sc-label">In Stock</div><div class="sc-val c-green">${inStock.toLocaleString()}</div></div>
    <div class="sc"><div class="sc-label">Sold Out</div><div class="sc-val c-red">${soldOut.toLocaleString()}</div></div>
    <div class="sc"><div class="sc-label">🐂 Bulls</div><div class="sc-val c-gold">${bulls.toLocaleString()}</div></div>
    <div class="sc"><div class="sc-label">🐐 Goats</div><div class="sc-val c-blue">${goats.toLocaleString()}</div></div>
    <div class="sc"><div class="sc-label">Total Value (PKR)</div>
      <div class="sc-val c-gold" style="font-size:${totVal>0?'14px':'22px'}">${totVal>0?fP(totVal):'—'}</div></div>
    ${totWgt>0?`<div class="sc"><div class="sc-label">Total Weight</div><div class="sc-val c-purple">${fN(totWgt)} kg</div></div>`:''}
  </div>`;

  /* ── Grid ── */
  let gridHTML;
  if (items.length === 0) {
    gridHTML = `<div class="grid-wrap"><div class="empty">
      <div class="empty-ico">🔍</div>
      <div class="empty-title">No items match your filters</div>
      <div class="empty-sub">Try changing the category, stock status, or search term.</div>
    </div></div>`;
  } else {
    const cards = items.map(it => {
      const f = getField(it);

      const catLabel = f.cat==='bull'?'🐂 Bull':f.cat==='goat'?'🐐 Goat':'Other';
      const stockLabel = f.stockStatus==='in'?'In Stock':f.stockStatus==='out'?'Sold Out':null;
      const stockCls   = f.stockStatus==='in'?'badge-in':f.stockStatus==='out'?'badge-out':'';

      const imgEl = f.imgUrl
        ? `<img src="${esc(f.imgUrl)}" alt="${esc(f.name)}"
               loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          + `<div class="img-ph" style="display:none">${f.cat==='bull'?'🐂':f.cat==='goat'?'🐐':'📦'}</div>`
        : `<div class="img-ph">${f.cat==='bull'?'🐂':f.cat==='goat'?'🐐':'📦'}</div>`;

      const qtyPills = (f.qtyOnHand!=null||f.qtyOwned!=null) ? `
        <div class="qty-row">
          ${f.qtyOnHand!=null?`<div class="qty-pill"><div class="qn">${fN(f.qtyOnHand)}</div><div class="ql">On Hand</div></div>`:''}
          ${f.qtyOwned !=null?`<div class="qty-pill"><div class="qn">${fN(f.qtyOwned)}</div><div class="ql">Owned</div></div>`:''}
        </div>`:''

      return `
      <div class="icard">
        <div class="img-wrap">
          ${imgEl}
          <span class="badge badge-cat badge-${esc(f.cat)}">${catLabel}</span>
          ${stockLabel?`<span class="badge badge-stock ${stockCls}">${stockLabel}</span>`:''}
        </div>
        <div class="ibody">
          <div class="iname" title="${esc(f.name)}">${esc(f.name)}</div>
          <div class="imeta">
            ${f.breed  ?`<div class="mrow"><span class="mico">🐾</span><span class="mval">${esc(f.breed)}</span></div>`:''}
            ${f.shed   ?`<div class="mrow"><span class="mico">🏚</span><span class="mval">${esc(String(f.shed))}</span></div>`:''}
            ${f.weight!=null?`<div class="mrow"><span class="mico">⚖️</span><span class="mval">${fN(f.weight)} kg</span></div>`:''}
          </div>
          ${qtyPills}
          <div class="iprice">
            <span class="pcurr">PKR</span>
            <span class="pval">${f.price!=null?fP(f.price):'—'}</span>
            <span class="plbl">SALE PRICE</span>
          </div>
        </div>
      </div>`;
    }).join('');

    gridHTML = `
    <div class="grid-wrap" id="grid-wrap">
      <div class="count-line">Showing <em>${items.length.toLocaleString()}</em> of <em>${all.length.toLocaleString()}</em> items</div>
      <div class="items-grid">${cards}</div>
    </div>`;
  }

  app.innerHTML = statsHTML + gridHTML;
}

/* ════════════════════════════════════════
   Export PDF
════════════════════════════════════════ */
async function exportPDF() {
  const btn = document.getElementById('pdf-btn');
  btn.textContent = '⏳ Generating…';
  btn.disabled = true;

  try {
    const { jsPDF } = window.jspdf;
    const app = document.getElementById('app');

    const canvas = await html2canvas(app, {
      backgroundColor: '#080c10', scale: 1.4,
      useCORS: true, allowTaint: true, logging: false,
    });

    const pageW=210, pageH=297, imgW=pageW;
    const imgH = canvas.height * imgW / canvas.width;
    const pdf  = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });

    /* header */
    pdf.setFillColor(13,18,25);
    pdf.rect(0,0,pageW,12,'F');
    pdf.setFont('helvetica','bold'); pdf.setFontSize(9);
    pdf.setTextColor(74,242,161);
    pdf.text('CATTLE VALLEY — LIVESTOCK INVENTORY', 8, 8);
    pdf.setFont('helvetica','normal'); pdf.setFontSize(7);
    pdf.setTextColor(61,84,112);
    pdf.text(`Generated: ${new Date().toLocaleString()}`, pageW-8, 8, {align:'right'});

    /* paginate */
    const sliceH = pageH - 12;
    const ratio  = canvas.height / imgH;
    let srcY=0, remaining=imgH, yPos=12;

    while (remaining > 0) {
      const curH = Math.min(sliceH, remaining);
      const sc   = document.createElement('canvas');
      sc.width   = canvas.width;
      sc.height  = Math.round(curH * ratio);
      const ctx  = sc.getContext('2d');
      ctx.fillStyle = '#080c10';
      ctx.fillRect(0,0,sc.width,sc.height);
      ctx.drawImage(canvas, 0, Math.round(srcY*ratio), canvas.width, sc.height, 0, 0, canvas.width, sc.height);
      pdf.addImage(sc.toDataURL('image/jpeg',0.9), 'JPEG', 0, yPos, imgW, curH);
      srcY += curH; remaining -= curH;
      if (remaining > 0) { pdf.addPage(); yPos = 0; }
    }

    pdf.save(`cattle-valley-inventory-${Date.now()}.pdf`);
  } catch (e) {
    alert('PDF export error: ' + e.message);
  } finally {
    btn.textContent = '⬇ Export PDF';
    btn.disabled = false;
  }
}

/* ── utility ── */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
